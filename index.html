<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datum und Uhrzeit</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: white;
      font-family: Arial, Helvetica, sans-serif;
      color: #001b70;
      overflow: hidden;
    }

    .widget {
      position: fixed;
      left: 50%;
      bottom: 45px;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
    }

    .time {
      font-size: 50px;
      font-weight: bold;
      line-height: 1;
      margin-bottom: 14px;
    }

    .date {
      font-size: 25px;
    }

    @media (max-width: 600px) {
      .date {
        font-size: 20px;
      }

      .time {
        font-size: 44px;
      }
    }
  </style>
</head>

<body>
  <div class="widget">
    <div class="time" id="time">--:--:--</div>
    <div class="date" id="date">Datum wird geladen …</div>
  </div>

  <script>
    function getCalendarWeek(date) {
      const tempDate = new Date(
        Date.UTC(date.getFullYear(), date.getMonth(), date.getDate())
      );

      const dayNumber = tempDate.getUTCDay() || 7;
      tempDate.setUTCDate(tempDate.getUTCDate() + 4 - dayNumber);

      const yearStart = new Date(
        Date.UTC(tempDate.getUTCFullYear(), 0, 1)
      );

      return Math.ceil(
        (((tempDate - yearStart) / 86400000) + 1) / 7
      );
    }

    function updateWidget() {
      const now = new Date();

      const time = now.toLocaleTimeString("de-DE", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });

      const date = now.toLocaleDateString("de-DE", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      });

      const calendarWeek = getCalendarWeek(now);

      document.getElementById("time").textContent = time;
      document.getElementById("date").textContent =
        `${date} (KW ${calendarWeek})`;
    }

    updateWidget();
    setInterval(updateWidget, 1000);
  </script>
</body>
</html>
